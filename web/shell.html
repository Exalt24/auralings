<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<meta name="theme-color" content="#2a2140">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas { margin: 0; padding: 0; border: 0; }
body { color: #f2ecff; background: #2a2140; overflow: hidden; touch-action: none; }
canvas, #canvas { display: block; margin: 0 auto; background: #2a2140; }
#canvas:focus { outline: none; }

/* branded loading overlay */
#status, #status-splash, #status-progress { position: absolute; left: 0; right: 0; }
#status, #status-splash { top: 0; bottom: 0; }
#status {
	background: linear-gradient(180deg, #2a2140 0%, #453763 100%);
	display: flex; flex-direction: column; justify-content: center; align-items: center;
	font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
	z-index: 5;
}
/* the Godot icon splash + native progress are kept for the boot script but hidden */
#status-splash { display: none !important; }
#status-progress { display: none !important; }

#brand-wrap { display: flex; flex-direction: column; align-items: center; padding: 0 24px; text-align: center; }
#brand {
	font-size: clamp(42px, 10vw, 76px); font-weight: 800; letter-spacing: 0.07em;
	color: #ffe9c7; text-shadow: 0 2px 26px rgba(107, 79, 208, 0.55);
}
#brand-tag { margin-top: 12px; font-size: clamp(14px, 3.6vw, 20px); color: #c9b8e8; }
#brand-orbit {
	margin-top: 30px; width: 64px; height: 64px; border-radius: 50%;
	border: 4px solid rgba(159, 240, 208, 0.18); border-top-color: #9ff0d0;
	animation: spin 0.9s linear infinite;
}
#bar {
	margin-top: 30px; width: min(62%, 300px); height: 12px; border-radius: 999px;
	background: rgba(255, 255, 255, 0.12); overflow: hidden;
}
#bar-inner {
	height: 100%; width: 0; border-radius: 999px;
	background: linear-gradient(90deg, #6b4fd0, #9ff0d0); transition: width 0.25s ease;
}
#bar-inner.indet { width: 38%; animation: slide 1.1s ease-in-out infinite; }
#brand-hint {
	margin-top: 18px; font-size: 13px; color: #9ff0d0;
	letter-spacing: 0.18em; text-transform: uppercase; animation: pulse 1.5s ease-in-out infinite;
}
#status-notice {
	background-color: #5b3943; border-radius: 0.6rem; border: 1px solid #9b3943;
	color: #ffe0e0; line-height: 1.3; margin: 1.4rem 2rem 0; padding: 1rem;
	text-align: center; z-index: 6; display: none; max-width: 80%;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slide { 0% { margin-left: -38%; } 100% { margin-left: 100%; } }
@keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">Your browser does not support the canvas tag.</canvas>
		<noscript>Your browser does not support JavaScript.</noscript>

		<div id="status">
			<div id="brand-wrap">
				<div id="brand">AURALINGS</div>
				<div id="brand-tag">summon infinite creatures, drawn by code, named by AI</div>
				<div id="brand-orbit"></div>
				<div id="bar"><div id="bar-inner" class="indet"></div></div>
				<div id="brand-hint">summoning</div>
			</div>
			<img id="status-splash" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const barInner = document.getElementById('bar-inner');
	const orbit = document.getElementById('brand-orbit');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		if (orbit) {
			orbit.style.display = mode === 'notice' ? 'none' : 'block';
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					barInner.classList.remove('indet');
					barInner.style.width = Math.min(100, (current / total) * 100) + '%';
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					barInner.classList.add('indet');
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
